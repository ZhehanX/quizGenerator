<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="container">
      <!-- Start Screen -->
      <div id="start-screen" class="screen active">
        <h1>Test de Redes</h1>
        <p>¡Pon a prueba tus conocimientos!</p>
        <button id="start-btn" class="primary-btn">Empezar Test</button>
      </div>

      <!-- Topic Selection Screen -->
      <div id="topic-screen" class="screen">
        <h1 class="topic-title">Selecciona un Tema</h1>
        <div id="topic-list" class="topic-list">
          <!-- Topics will be injected by script.js -->
        </div>
        <div id="loading-indicator" class="loading-indicator hidden">
          <div class="spinner"></div>
          <p>Cargando preguntas...</p>
        </div>
        <div id="error-container" class="error-container hidden">
          <p id="error-message" class="error-text"></p>
          <button id="retry-btn" class="secondary-btn">Reintentar</button>
        </div>
      </div>

      <!-- Question Screen -->
      <div id="question-screen" class="screen">
        <div class="progress-container">
          <span id="question-counter">Pregunta 1/108</span>
          <span id="score-display">Puntuación: 0</span>
        </div>
        <h2 id="question-text">Question goes here</h2>
        <div id="options-grid" class="options-grid">
          <!-- Options will be injected here -->
        </div>
        <div id="feedback-container" class="feedback-container hidden">
          <p id="explanation-text" class="explanation-text"></p>
          <button id="next-btn" class="secondary-btn margin-top">
            Siguiente Pregunta
          </button>
        </div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="screen">
        <h2>¡Test Completado!</h2>
        <p id="final-score" class="score-text">¡Has acertado X de Y!</p>
        <div class="feedback-icon" id="feedback-icon">🏆</div>
        <button id="restart-btn" class="primary-btn">Jugar de Nuevo</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
